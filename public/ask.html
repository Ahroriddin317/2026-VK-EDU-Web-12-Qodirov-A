<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Задать вопрос | AskMe</title>
    <link rel="stylesheet" href="static/css/bootstrap.min.css">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">AskMe</a>
            <div class="d-flex align-items-center">
                <img src="static/img/avatar.jpg" class="rounded-circle me-2" width="40" height="40">
                <span class="text-white me-3">Ivanov</span>
                <a href="login.html" class="btn btn-sm btn-outline-light">Log Out</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row">
            <main class="col-lg-9">
                <h2 class="mb-4">New Question</h2>
                <form class="bg-white p-4 rounded shadow-sm">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Title</label>
                        <input type="text" class="form-control is-invalid" placeholder="How to build a rocket?">
                        <div class="invalid-feedback">Title is too short.</div> </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Text</label>
                        <textarea class="form-control" rows="8" placeholder="Enter full description..."></textarea>
                        <div class="form-text">Describe your problem in detail.</div> </div>
                    <div class="mb-4">
                        <label class="form-label fw-bold">Tags</label>
                        <input type="text" class="form-control" placeholder="tag1, tag2, tag3">
                    </div>
                    <button type="submit" class="btn btn-primary px-5">Ask!</button>
                </form>
            </main>

            <aside class="col-lg-3">
                <div class="p-3 bg-white rounded shadow-sm">
                    <h5>Best Members</h5>
                    <ul class="list-unstyled mb-0">
                        <li><a href="#" class="text-decoration-none">Mr. Freeman</a></li>
                    </ul>
                </div>
            </aside>
        </div>
    </div>
    <script src="static/js/bootstrap.bundle.min.js"></script>
</body>
</html>
