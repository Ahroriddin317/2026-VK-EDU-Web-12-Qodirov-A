{% extends 'questions/base.html' %}
{% block content %}
      <main class="col-lg-9">
        <h2 class="mb-4">New Question</h2>
        <form class="bg-white p-4 rounded shadow-sm">
          <div class="mb-3">
            <label class="form-label fw-bold">Title</label>
            <input type="text" class="form-control is-invalid" placeholder="How to build a rocket?" />
            <div class="invalid-feedback">Title is too short.</div>
          </div>
          <div class="mb-3">
            <label class="form-label fw-bold">Text</label>
            <textarea class="form-control" rows="8" placeholder="Enter full description..."></textarea>
            <div class="form-text">Describe your problem in detail.</div>
          </div>
          <div class="mb-4">
            <label class="form-label fw-bold">Tags</label>
            <input type="text" class="form-control" placeholder="tag1, tag2, tag3" />
          </div>
          <button type="submit" class="btn btn-primary px-5">Ask!</button>
        </form>
      </main>
{% endblock %}
