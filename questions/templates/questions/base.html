{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>AskMe — Вопросы и ответы</title>
    <link rel="icon" href="static/img/favicon.ico" type="image/x-icon">

    <link rel="stylesheet" href="{% static 'questions/css/bootstrap.min.css' %}">
</head>
<body class="d-flex flex-column min-vh-100 bg-light">

    <header class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">AskMe</a>
            
            <form class="d-flex flex-grow-1 mx-lg-5">
                <input class="form-control me-2" type="search" placeholder="Поиск по вопросам...">
            </form>

            <div class="d-flex align-items-center">
                <a href="ask" class="btn btn-primary me-3">Ask!</a>
                
                <div class="d-flex align-items-center text-white text-decoration-none">
                    <img src={% static 'questions/img/avatar.jpg' %} class="rounded-circle me-2" width="40" height="40" alt="Avatar">
                    <div class="dropdown">
                        <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">Ivanov</a>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li><a class="dropdown-item" href="profile">Settings</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item" href="login">Log Out</a></li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <div class="container flex-grow-1">
        <div class="row">
            
            <main class="col-lg-9">
                {% block content %}
                {% endblock %}
                </main>

            <aside class="col-lg-3">
                <div class="p-3 bg-white rounded shadow-sm mb-4">
                    <h5>Popular Tags</h5>
                    <div class="d-flex flex-wrap gap-1">
                        <span class="badge bg-secondary">python</span> <span class="badge bg-secondary">sql</span>
                        <span class="badge bg-secondary">django</span> <span class="badge bg-secondary">docker</span>
                    </div>
                </div>

                <div class="p-3 bg-white rounded shadow-sm">
                    <h5>Best Members</h5>
                    <ul class="list-unstyled mb-0">
                        <li><a href="#" class="text-decoration-none">Mr. Freeman</a></li>
                        <li><a href="#" class="text-decoration-none">Dr. House</a></li>
                    </ul>
                </div>
            </aside>

        </div>
    </div>

    <footer class="bg-white border-top py-3 mt-5">
        <div class="container text-center text-muted small">
            &copy; 2026 AskMe Project. VK EDU Web Course.
        </div>
    </footer>

    <script src="{% static 'questions/js/bootstrap.bundle.min.js' %}"></script>
</body>
</html>
