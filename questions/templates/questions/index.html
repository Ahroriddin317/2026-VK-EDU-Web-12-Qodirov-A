{% extends 'questions/base.html' %}
{% load static %}

{% block content %}
<div class="container">
  <div class="row">
    <main class="col-lg-9">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>New Questions</h2>
        <a href="#" class="text-decoration-none">Hot Questions</a>
      </div>
      {% for question in questions %}
        <div class="card mb-3 shadow-sm">
          <div class="card-body">
            <div class="row">
              <div class="col-2 text-center">
                <img src="{% static 'questions/img/avatar.jpg' %}" class="img-thumbnail mb-2" width="80" />
                <div class="border rounded d-flex flex-column overflow-hidden">
                  <button class="btn btn-sm btn-light border-0">&plus;</button>
                  <span class="py-1 fw-bold">42</span>
                  <button class="btn btn-sm btn-light border-0">&minus;</button>
                </div>
              </div>
              <div class="col-10">
                <h4 class="card-title"><a href="question.html" class="text-decoration-none">{{ question.title }}</a></h4>
                <p class="card-text">{{ question.text }}</p>
                <div class="d-flex gap-2 align-items-center">
                  <a href="question.html" class="small">Answers (5)</a>
                  <span class="badge bg-info text-dark">Python</span>
                  <span class="badge bg-info text-dark">Web</span>
                </div>
              </div>
            </div>
          </div>
        </div>
      {% endfor %}
      <nav class="mt-4">
        <ul class="pagination">
          <li class="page-item active">
            <a class="page-link" href="#">1</a>
          </li>
          <li class="page-item">
            <a class="page-link" href="#">2</a>
          </li>
          <li class="page-item">
            <a class="page-link" href="#">3</a>
          </li>
        </ul>
      </nav>
    </main>
    {% endblock %}
  </div>
</div>
