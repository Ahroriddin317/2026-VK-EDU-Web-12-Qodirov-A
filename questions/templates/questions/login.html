<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Горячие вопросы | AskMe</title>
    <link rel="stylesheet" href="static/css/bootstrap.min.css">
</head>

<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">AskMe</a>
            <form class="d-flex flex-grow-1 mx-lg-5">
                <input class="form-control me-2" type="search" placeholder="Поиск...">
            </form>
            <div class="d-flex align-items-center text-white">
                <a href="ask.html" class="btn btn-primary me-3">Ask!</a>
                <img src="static/img/avatar.jpg" class="rounded-circle me-2" width="40" height="40">
                <div class="dropdown">
                    <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">Ivanov</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row">
            <main class="col-lg-9">
                <div class="row justify-content-center">
                    <div class="col-md-6 mt-5">
                        <h2 class="mb-4">Log In</h2>
                        <div class="alert alert-danger">Invalid username or password.</div>
                        <form>
                            <div class="mb-3">
                                <label class="form-label">Login</label>
                                <input type="text" class="form-control is-invalid">
                                <div class="invalid-feedback">Field is required.</div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Password</label>
                                <input type="password" class="form-control">
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Login</button>
                            <p class="mt-3 text-center"><a href="signup.html">Create an account</a></p>
                        </form>
                    </div>
                </div>
            </main>

            <aside class="col-lg-3">
                <div class="p-3 bg-white rounded shadow-sm mb-4">
                    <h5>Popular Tags</h5>
                    <div class="d-flex flex-wrap gap-1">
                        <span class="badge bg-secondary">python</span> <span class="badge bg-secondary">sql</span>
                        <span class="badge bg-secondary">django</span> <span class="badge bg-secondary">docker</span>
                    </div>
                </div>
                <div class="p-3 bg-white rounded shadow-sm">
                    <h5>Best Members</h5>
                    <ul class="list-unstyled mb-0">
                        <li><a href="#" class="text-decoration-none">Mr. Freeman</a></li>
                        <li><a href="#" class="text-decoration-none">Dr. House</a></li>
                    </ul>
                </div>
            </aside>
        </div>
    </div>

    <script src="static/js/bootstrap.bundle.min.js"></script>
</body>

</html>
