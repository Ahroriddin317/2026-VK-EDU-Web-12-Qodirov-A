<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Горячие вопросы | AskMe</title>
    <link rel="stylesheet" href="static/css/bootstrap.min.css">
</head>

<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">AskMe</a>
            <form class="d-flex flex-grow-1 mx-lg-5">
                <input class="form-control me-2" type="search" placeholder="Поиск...">
            </form>
            <div class="d-flex align-items-center text-white">
                <a href="ask.html" class="btn btn-primary me-3">Ask!</a>
                <img src="static/img/avatar.jpg" class="rounded-circle me-2" width="40" height="40">
                <div class="dropdown">
                    <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">Ivanov</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row">
            <main class="col-lg-9">
                <div class="card mb-4 border-0 border-bottom pb-3">
                    <div class="row g-0">
                        <div class="col-md-2 text-center">
                            <img src="static/img/avatar.jpg" class="rounded mb-2" width="80">
                            <div class="fw-bold">42</div>
                        </div>
                        <div class="col-md-10">
                            <h3>Как выучить Django за 5 минут?</h3>
                            <p>Тут длинный текст вопроса, который занимает много места...</p>
                            <hr>
                        </div>
                    </div>
                </div>

                <h5>Answers (2)</h5>
                <div class="card mb-3 border-success">
                    <div class="card-body">
                        <div class="d-flex">
                            <div class="me-3 text-center">
                                <img src="static/img/avatar2.jpg" width="50" class="rounded">
                                <div class="small fw-bold mt-1">15</div>
                            </div>
                            <div>
                                <p>Никак. Иди учись нормально!</p>
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" checked disabled>
                                    <label class="form-check-label text-success fw-bold">Correct answer!</label>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <form class="mt-4">
                    <textarea class="form-control mb-2" rows="5" placeholder="Enter your answer..."></textarea>
                    <button class="btn btn-primary px-5">Answer</button>
                </form>
            </main>

            <aside class="col-lg-3">
                <div class="p-3 bg-white rounded shadow-sm mb-4">
                    <h5>Popular Tags</h5>
                    <div class="d-flex flex-wrap gap-1">
                        <span class="badge bg-secondary">python</span> <span class="badge bg-secondary">sql</span>
                        <span class="badge bg-secondary">django</span> <span class="badge bg-secondary">docker</span>
                    </div>
                </div>
                <div class="p-3 bg-white rounded shadow-sm">
                    <h5>Best Members</h5>
                    <ul class="list-unstyled mb-0">
                        <li><a href="#" class="text-decoration-none">Mr. Freeman</a></li>
                        <li><a href="#" class="text-decoration-none">Dr. House</a></li>
                    </ul>
                </div>
            </aside>
        </div>
    </div>

    <script src="static/js/bootstrap.bundle.min.js"></script>
</body>

</html>
