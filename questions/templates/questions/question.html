{% extends 'questions/base.html' %}
{% load static %}

{% block content %}
<div class="container">
  <div class="row">
    <main class="col-lg-9">
      <div class="card mb-4 border-0 border-bottom pb-3">
        <div class="row g-0">
          <div class="col-md-2 text-center">
            <img src="{% static 'questions/img/avatar.jpg' %}" class="rounded mb-2" width="80" />
            <div class="fw-bold">42</div>
          </div>
          <div class="col-md-10">
            <h3>Как выучить Django за 5 минут?</h3>
            <p>Тут длинный текст вопроса, который занимает много места...</p>
            <hr />
          </div>
        </div>
      </div>

      <h5>Answers (2)</h5>
      <div class="card mb-3 border-success">
        <div class="card-body">
          <div class="d-flex">
            <div class="me-3 text-center">
              <img src="{% static 'questions/img/avatar.jpg' %}" width="50" class="rounded" />
              <div class="small fw-bold mt-1">15</div>
            </div>
            <div>
              <p>Никак. Иди учись нормально!</p>
              <div class="form-check">
                <input class="form-check-input" type="checkbox" checked disabled />
                <label class="form-check-label text-success fw-bold">Correct answer!</label>
              </div>
            </div>
          </div>
        </div>
      </div>

      <form class="mt-4">
        <textarea class="form-control mb-2" rows="5" placeholder="Enter your answer..."></textarea>
        <button class="btn btn-primary px-5">Answer</button>
      </form>
    </main>
  </div>
</div>

 {% endblock %}
