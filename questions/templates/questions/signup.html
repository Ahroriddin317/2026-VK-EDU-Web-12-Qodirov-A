<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация | AskMe</title>
    <link rel="stylesheet" href="static/css/bootstrap.min.css">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">AskMe</a>
            <div class="d-flex align-items-center">
                <a href="login.html" class="btn btn-outline-light btn-sm me-2">Log In</a>
                <a href="signup.html" class="btn btn-primary btn-sm">Sign Up</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row">
            <main class="col-lg-9">
                <h2 class="mb-4">Registration</h2>
                
                <div class="alert alert-danger">Please correct the errors below.</div>

                <form class="bg-white p-4 rounded shadow-sm">
                    <div class="mb-3">
                        <label class="form-label">Login</label>
                        <input type="text" class="form-control" placeholder="ivanov_2026">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email address</label>
                        <input type="email" class="form-control is-invalid">
                        <div class="invalid-feedback">This email is already taken.</div> </div>
                    <div class="mb-3">
                        <label class="form-label">Nickname</label>
                        <input type="text" class="form-control" placeholder="Dr. Pepper">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-control">
                        <div class="form-text">At least 8 characters long.</div> </div>
                    <div class="mb-3">
                        <label class="form-label">Repeat Password</label>
                        <input type="password" class="form-control">
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Upload Avatar</label>
                        <input type="file" class="form-control">
                    </div>
                    <button type="submit" class="btn btn-primary px-5">Register!</button>
                </form>
            </main>

            <aside class="col-lg-3">
                <div class="p-3 bg-white rounded shadow-sm mb-4">
                    <h5>Popular Tags</h5>
                    <span class="badge bg-secondary">python</span> <span class="badge bg-secondary">django</span>
                </div>
            </aside>
        </div>
    </div>
    <script src="static/js/bootstrap.bundle.min.js"></script>
</body>
</html>
